<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Daily Class Report System</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Firebase SDKs (Firestore) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <!-- Notification Sound (Short Notification Tone) -->
    <audio id="notifSound" preload="auto">
        <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
    </audio>

    <!-- Top Navigation Bar -->
    <nav class="bg-indigo-700 text-white p-4 shadow-lg flex justify-between items-center">
        <h1 class="text-xl font-bold">School Reporting Portal</h1>
        <div class="space-x-2">
            <button onclick="switchTab('coordinator')" class="bg-indigo-800 hover:bg-indigo-900 px-4 py-2 rounded-lg text-sm font-semibold transition">Coordinator View</button>
            <button onclick="switchTab('madam')" class="bg-indigo-800 hover:bg-indigo-900 px-4 py-2 rounded-lg text-sm font-semibold transition relative">
                Madam View
                <span id="notifBadge" class="hidden absolute -top-1 -right-1 bg-red-500 text-white text-xs px-2 py-0.5 rounded-full animate-pulse">New</span>
            </button>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto p-6">

        <!-- ================= COORDINATOR SECTION ================= -->
        <section id="coordinatorTab" class="bg-white rounded-xl shadow-md p-6 border border-gray-200">
            <h2 class="text-2xl font-bold text-gray-800 mb-4 pb-2 border-b">Coordinator Daily Report Form</h2>
            
            <form id="reportForm" onsubmit="submitReport(event)" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Teacher Name</label>
                    <input type="text" id="teacherName" required placeholder="Enter Teacher Name" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Class & Section</label>
                        <select id="className" required class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                            <option value="">Select Class</option>
                            <option value="Nursery">Nursery</option>
                            <option value="Prep">Prep</option>
                            <option value="Class 1">Class 1</option>
                            <option value="Class 2">Class 2</option>
                            <option value="Class 3">Class 3</option>
                            <option value="Class 4">Class 4</option>
                            <option value="Class 5">Class 5</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Subject / Period</label>
                        <input type="text" id="subjectName" required placeholder="e.g. Mathematics - 2nd Period" class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Lesson / Work Done in Class</label>
                    <textarea id="workDone" rows="4" required placeholder="Details of what was taught today..." class="w-full p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:outline-none"></textarea>
                </div>

                <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg shadow transition">
                    Submit Report to Madam
                </button>
            </form>
        </section>

        <!-- ================= MADAM / PRINCIPAL SECTION ================= -->
        <section id="madamTab" class="hidden bg-white rounded-xl shadow-md p-6 border border-gray-200">
            <div class="flex justify-between items-center mb-4 pb-2 border-b">
                <h2 class="text-2xl font-bold text-gray-800">Madam Dashboard (Live Reports)</h2>
                <div class="flex items-center gap-2">
                    <button onclick="enableSoundAndPermission()" class="bg-amber-100 hover:bg-amber-200 text-amber-900 border border-amber-300 text-xs px-3 py-1.5 rounded-lg font-semibold transition flex items-center gap-1 shadow-sm">
                        🔔 Enable Sound & Alerts
                    </button>
                    <span id="reportCount" class="bg-indigo-100 text-indigo-800 text-xs font-semibold px-3 py-1 rounded-full">0 Reports Today</span>
                </div>
            </div>

            <!-- Toast Notification Banner -->
            <div id="toastNotif" class="hidden mb-4 bg-green-100 border-l-4 border-green-500 text-green-700 p-4 rounded shadow-sm" role="alert">
                <p class="font-bold">Naya Notification!</p>
                <p id="toastMsg">Aik naye period ki report submit hui hai.</p>
            </div>

            <div id="reportsList" class="space-y-4">
                <p class="text-gray-500 text-center py-6">Loading reports...</p>
            </div>
        </section>

    </div>

    <script>
        // FIREBASE CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyBD_WQ8tDZfd_7ZElCFWfH2soKjn3FIIZI",
            authDomain: "syllabus-c7fd7.firebaseapp.com",
            projectId: "syllabus-c7fd7",
            storageBucket: "syllabus-c7fd7.firebasestorage.app",
            messagingSenderId: "337710632873",
            appId: "1:337710632873:web:f9abae923620c9e0a3feb8"
        };

        // Initialize Firebase & Firestore
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let initialLoadDone = false;

        // Manual Sound & Notification Enable (Sirf Button Click par chalaega)
        function enableSoundAndPermission() {
            // Unlocks browser audio policy
            const audio = document.getElementById('notifSound');
            audio.play().then(() => {
                audio.pause();
                audio.currentTime = 0;
            }).catch(e => console.log("Audio unlocked"));

            if ("Notification" in window) {
                if (Notification.permission === "granted") {
                    showToast("Alerts and Sound active hain!");
                } else if (Notification.permission !== "denied") {
                    Notification.requestPermission().then(permission => {
                        if (permission === "granted") {
                            showToast("Sound aur Desktop Alerts enable ho chuke hain!");
                        }
                    });
                }
            }
        }

        // Switch View (Tab badalne par auto-popup bilkul nahi aayega)
        function switchTab(tab) {
            if (tab === 'coordinator') {
                document.getElementById('coordinatorTab').classList.remove('hidden');
                document.getElementById('madamTab').classList.add('hidden');
            } else {
                document.getElementById('coordinatorTab').classList.add('hidden');
                document.getElementById('madamTab').classList.remove('hidden');
                document.getElementById('notifBadge').classList.add('hidden');
            }
        }

        // Submit Form
        function submitReport(e) {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "Submitting...";

            const newReport = {
                teacher: document.getElementById('teacherName').value,
                class: document.getElementById('className').value,
                subject: document.getElementById('subjectName').value,
                work: document.getElementById('workDone').value,
                timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            };

            db.collection('reports').add(newReport).then(() => {
                alert("Report Madam tak bhej di gayi hai!");
                document.getElementById('reportForm').reset();
                submitBtn.disabled = false;
                submitBtn.innerText = "Submit Report to Madam";
            }).catch(error => {
                alert("Error: " + error.message);
                submitBtn.disabled = false;
                submitBtn.innerText = "Submit Report to Madam";
            });
        }

        // Realtime Listener for Madam View
        db.collection('reports').orderBy('createdAt', 'desc').onSnapshot((snapshot) => {
            const reportsList = document.getElementById('reportsList');
            reportsList.innerHTML = '';

            if (snapshot.empty) {
                reportsList.innerHTML = '<p class="text-gray-500 text-center py-6">Abhi tak koi report submit nahi hui.</p>';
                document.getElementById('reportCount').innerText = '0 Reports Today';
                return;
            }

            document.getElementById('reportCount').innerText = `${snapshot.size} Reports Total`;

            let latestDoc = null;

            snapshot.forEach((doc, index) => {
                const report = doc.data();
                if (index === 0) latestDoc = report;

                const card = `
                    <div class="bg-gray-50 border-l-4 border-indigo-600 p-4 rounded-r-lg shadow-sm">
                        <div class="flex justify-between items-start mb-2">
                            <div>
                                <h3 class="font-bold text-gray-800 text-lg">${report.teacher}</h3>
                                <p class="text-sm font-semibold text-indigo-600">${report.class} - ${report.subject}</p>
                            </div>
                            <span class="text-xs bg-gray-200 text-gray-600 px-2 py-1 rounded">${report.timestamp || ''}</span>
                        </div>
                        <p class="text-gray-700 text-sm mt-2 bg-white p-3 rounded border border-gray-200">${report.work}</p>
                    </div>
                `;
                reportsList.innerHTML += card;
            });

            if (initialLoadDone && snapshot.docChanges().some(change => change.type === "added")) {
                document.getElementById('notifBadge').classList.remove('hidden');
                
                // 1. Play Sound
                playNotificationSound();

                // 2. Desktop Notification & Toast Banner
                const msg = `${latestDoc ? latestDoc.teacher : 'Teacher'} ne ${latestDoc ? latestDoc.class : 'class'} ki report submit ki hai.`;
                showToast(msg);
                showDesktopNotification("Nayi Class Report!", msg);
            }

            initialLoadDone = true;
        });

        function playNotificationSound() {
            const sound = document.getElementById('notifSound');
            sound.currentTime = 0;
            sound.play().catch(e => console.log("Sound waiting for user interaction"));
        }

        function showDesktopNotification(title, body) {
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification(title, {
                    body: body,
                    icon: 'https://cdn-icons-png.flaticon.com/512/3602/3602145.png'
                });
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toastNotif');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.remove('hidden');
            setTimeout(() => {
                toast.classList.add('hidden');
            }, 6000);
        }
    </script>
</body>
</html>
